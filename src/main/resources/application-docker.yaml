spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST_DOCKER}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
      dialect: org.hibernate.dialect.PostgreSQLDialect
      default_schema: public
    show-sql: true
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.yaml
jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000
  refresh-expiration: 360000000
userservice:
  base-url: ${USERSERVICE_BASE_URL:http://userservice:8080}
authservice:
  internal-endpoint-secret: ${AUTHSERVICE_INTERNAL_ENDPOINT_SECRET}
admin:
  username: ${ADMIN_USERNAME:}
  email: ${ADMIN_EMAIL:}
  password: ${ADMIN_PASSWORD:}
services:
  userservice-url: ${USERSERVICE_BASE_URL:http://userservice:8080}
  internal-secret: ${SERVICES_INTERNAL_SECRET:internal-secret}
server:
  port: 8082
